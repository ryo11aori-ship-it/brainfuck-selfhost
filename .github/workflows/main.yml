name: BrainfuckSelfHosting
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gen0
        run: |
          wget https://raw.githubusercontent.com/matslin/awib/master/awib.b -O awib.b
          cat << 'EOF' > bftoc.c
          #include <stdio.h>
          #include <stdlib.h>
          int main(){
          printf("#include <stdio.h>\n#include <stdlib.h>\nint main(){unsigned char *a=calloc(300000,1);unsigned char *p=a+150000;\n");
          int c;
          while((c=getchar())!=EOF){
          if(c=='>')printf("p++;\n");
          else if(c=='<')printf("p--;\n");
          else if(c=='+')printf("(*p)++;\n");
          else if(c=='-')printf("(*p)--;\n");
          else if(c=='.')printf("putchar(*p);\n");
          else if(c==',')printf("{int x=getchar();if(x!=EOF)*p=x;}\n");
          else if(c=='[')printf("while(*p){\n");
          else if(c==']')printf("}\n");
          }
          printf("return 0;}\n");
          return 0;
          }
          EOF
          gcc -O3 bftoc.c -o gen0
          chmod +x gen0
      - name: Gen1
        run: |
          ./gen0 < awib.b > gen1.c
          gcc -O3 gen1.c -o gen1
          chmod +x gen1
      - name: Gen2
        run: |
          (echo "@386_linux"; cat awib.b) | ./gen1 > gen2
          chmod +x gen2
      - name: Gen3
        run: |
          (echo "@386_linux"; cat awib.b) | ./gen2 > gen3
          chmod +x gen3
      - name: Check
        run: |
          sha256sum gen2 gen3
          H2=$(sha256sum gen2 | awk '{print $1}')
          H3=$(sha256sum gen3 | awk '{print $1}')
          if [ "$H2" = "$H3" ]; then echo "Success: Hashes match!"; exit 0; else echo "Fail: Hashes differ"; exit 1; fi
